<!DOCTYPE html> <!-- indica que é um documento html-->
<html lang="pt-br"> <!-- elemento raiz -->
    <head>
        <!-- sistema de codificação português -->
        <meta charset="utf-8"> 
        <!-- faz ligação com o CSS -->
        <link rel="stylesheet" href="style_a1.css">
        <title> Meu cartão de visita </title>
    </head>
    <body>
        <!-- usar class tem a vantagem de reaproveitar estila css-->
        <div class = "cartao"> <!-- delimitação lógica de uma área -->
            <!-- imagem, título, parágrafo e link -->
            <img src ="ratinho.png" alt="foto do ratinho" class="imagem"> <!-- imagem -->
            <h1 class="T" > Olá a todos </h1> <!-- Título -->
            <p class="P"> Bem-Vindo ao meu cartão de visita </p> <!-- parágrafo -->
            <!-- link fora do botao / target _blank abre uma nova area -->
            <a target ="_blank" href="https://github.com/RafaAlvesPa"> 
                <button> Acesse meu github!</button>
            </a>
    </body>
</html>
